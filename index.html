<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAGE_X Official | MVP SHOWDOWN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <header class="app-header">
        <div class="profile-section">
            <div class="avatar-container">
                <div class="avatar-ring"></div>
                <img src="images/profile_avatar.jpg" alt="PAGE_X" class="user-avatar">
            </div>
            <div class="user-meta">
                <h1 class="alias">podo.page_x <span class="badge">PAGE_X🔥</span></h1>
                <div class="engagement-stats">
                    <span><strong>86</strong> 关注</span>
                    <span><strong>24.7K</strong> 粉丝</span>
                    <span><strong>85.3K</strong> 获赞</span>
                </div>
            </div>
        </div>
        <div class="bio-section">
            <p>📍 South Korea</p>
            <p>@Eunwo🐹 @LEO🐺 @Nick🧛 @SUHO🐶</p>
            <p class="highlight-text">LIVE Time | 09:00am (KST)</p>
        </div>
        <div class="interaction-bar">
            <button class="btn-primary" id="followBtn">关注 (Follow)</button>
            <button class="btn-secondary">消息 (Message)</button>
        </div>
    </header>

    <div class="tab-divider"></div>

    <main class="feed-container">
        <article class="post-card">
            <div class="post-header">
                <span class="post-title">PAGE_X MVP SHOWDOWN</span>
                <span class="post-date">1.MAR 08:30 (KST)</span>
            </div>
            
            <div class="media-canvas" onclick="Gallery.open(0)">
                <img src="images/card-1.jpg" alt="MVP Showdown Cover" class="responsive-img">
                <div class="tap-hint">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    点击查看详情
                </div>
            </div>

            <div class="post-footer">
                <div class="quick-actions">
                    <span class="action-item" onclick="Interaction.like(this)">
                        <svg class="heart-icon" width="24" height="24" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span class="count">85.3K</span>
                    </span>
                </div>
                <p class="caption">Make Your Bias the King! 👑 谁将成为最终的 MVP？</p>
            </div>
        </article>
    </main>

    <div class="overlay" id="galleryOverlay">
        <div class="progress-container">
            <div class="progress-segment"><div class="progress-fill" id="p1"></div></div>
            <div class="progress-segment"><div class="progress-fill" id="p2"></div></div>
        </div>

        <button class="exit-button" onclick="Gallery.close()">✕ 返回</button>
        
        <div class="viewer-wrapper">
            <button class="circle-nav prev" onclick="Gallery.prev()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>

            <div class="img-host">
                <img id="activeImg" src="" alt="Detail View">
            </div>

            <button class="circle-nav next" onclick="Gallery.next()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
